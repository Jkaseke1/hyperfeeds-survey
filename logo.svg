<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- Navy oval background -->
  <ellipse cx="160" cy="80" rx="155" ry="74" fill="#1a2160"/>

  <!-- Orange arc at bottom of oval -->
  <path d="M 30 118 Q 160 165 290 118" stroke="#f5a623" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Wheat stalk left -->
  <g transform="translate(130,28) rotate(-18)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="#f5a623" stroke-width="1.5"/>
    <ellipse cx="-4" cy="6" rx="3.5" ry="7" fill="#f5a623" transform="rotate(-20,-4,6)"/>
    <ellipse cx="4" cy="10" rx="3.5" ry="7" fill="#f5a623" transform="rotate(20,4,10)"/>
    <ellipse cx="-3" cy="17" rx="3" ry="6" fill="#f5a623" transform="rotate(-15,-3,17)"/>
    <ellipse cx="3" cy="20" rx="3" ry="6" fill="#f5a623" transform="rotate(15,3,20)"/>
    <ellipse cx="0" cy="2" rx="2.5" ry="5" fill="#f5a623"/>
  </g>

  <!-- Wheat stalk right -->
  <g transform="translate(192,26) rotate(18)">
    <line x1="0" y1="0" x2="0" y2="28" stroke="#f5a623" stroke-width="1.5"/>
    <ellipse cx="-4" cy="6" rx="3.5" ry="7" fill="#f5a623" transform="rotate(-20,-4,6)"/>
    <ellipse cx="4" cy="10" rx="3.5" ry="7" fill="#f5a623" transform="rotate(20,4,10)"/>
    <ellipse cx="-3" cy="17" rx="3" ry="6" fill="#f5a623" transform="rotate(-15,-3,17)"/>
    <ellipse cx="3" cy="20" rx="3" ry="6" fill="#f5a623" transform="rotate(15,3,20)"/>
    <ellipse cx="0" cy="2" rx="2.5" ry="5" fill="#f5a623"/>
  </g>

  <!-- "hyper" in white italic -->
  <text x="68" y="98"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-style="italic"
    font-weight="400"
    fill="white"
    letter-spacing="-1">hyper</text>

  <!-- "feeds" in orange italic bold -->
  <text x="175" y="98"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-style="italic"
    font-weight="700"
    fill="#f5a623"
    letter-spacing="-1">feeds</text>

  <!-- "ANIMAL NUTRITION" tagline -->
  <text x="160" y="118"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    font-weight="600"
    fill="white"
    letter-spacing="3.5"
    text-anchor="middle">ANIMAL NUTRITION</text>
</svg>
